name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "papers/**"
      - ".github/workflows/pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build reflector PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex
          working_directory: papers/reflector
          extra_system_packages: "biber"
          args: >-
            -pdf
            -interaction=nonstopmode
            -synctex=1
            -file-line-error
            -shell-escape
            -f
            -gg
            -cd
            -r
            .latexmkrc

      - name: Assemble Pages site
        run: |
          mkdir --parents _site/reflector

          if [[ -d docs ]]; then
            cp --recursive docs/. _site/
          fi

          if [[ ! -f papers/reflector/.cache/out/paper.pdf ]]; then
            echo "Expected PDF not found at papers/reflector/.cache/out/paper.pdf" >&2
            exit 1
          fi

          cp \
            papers/reflector/.cache/out/paper.pdf \
            _site/reflector/reflector.pdf

          cat > _site/reflector/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>reflector</title>
          </head>
          <body>
            <h1>reflector</h1>
            <ul>
              <li>
                <a href="./reflector.pdf">
                  Download PDF
                </a>
              </li>
              <li>
                <a href="../">Back to papers index</a>
              </li>
            </ul>
          </body>
          </html>
          EOF

          echo "Assembled Pages content:"
          find _site
          echo "Paper build content:"
          find papers -maxdepth 3
          echo "Runner temp content:"
          find "${RUNNER_TEMP}" -maxdepth 2 2>/dev/null || true

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
