name: Build Paper

on:
  push:
    branches:
      - main
    paths:
      - "papers/**"
      - "scripts/**"
      - ".github/workflows/build-paper.yml"

  pull_request:
    branches:
      - main
    paths:
      - "papers/**"
      - "scripts/**"
      - ".github/workflows/build-paper.yml"

  workflow_dispatch:
    inputs:
      paper:
        description: "Paper directory"
        required: false
        default: "papers/reflector"

permissions:
  contents: read

jobs:
  build:
    name: Build Paper
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        paper:
          - papers/reflector

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set artifact names
        id: vars
        run: |
          PAPER_NAME="$(basename "${{ matrix.paper }}")"

          echo "paper_name=${PAPER_NAME}" >> "$GITHUB_OUTPUT"
          echo "pdf_artifact=${PAPER_NAME}-pdf" >> "$GITHUB_OUTPUT"
          echo "build_artifact=${PAPER_NAME}-build-artifacts" >> "$GITHUB_OUTPUT"

      - name: Build LaTeX PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex
          working_directory: ${{ matrix.paper }}
          extra_system_packages: "biber"
          args: >-
            -pdf
            -bibtex
            -outdir=build
            -interaction=nonstopmode
            -file-line-error

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.pdf_artifact }}
          path: ${{ matrix.paper }}/build/paper.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.build_artifact }}
          path: ${{ matrix.paper }}/build/
          if-no-files-found: warn
          retention-days: 7
